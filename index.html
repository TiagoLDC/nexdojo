
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NexDojo</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
      }
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* Estabilização da Câmera */
      #qr-reader {
        border: none !important;
        background: black !important;
      }
      #qr-reader video {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        border-radius: 0px !important;
      }
      #qr-reader__scan_region {
        background: black !important;
      }
      /* Remove overlays automáticos da biblioteca que podem causar bugs visuais */
      #qr-reader__dashboard {
        display: none !important;
      }
      img[alt="Info icon"], img[alt="Camera icon"] {
        display: none !important;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
